<!DOCTYPE html>
<html>
<head><title>Glasses Test</title></head>
<body>
<div id="app">
  <h2>Glasses Test</h2>
  <button id="connect-btn">Connect Glasses</button>
  <p id="status">Not connected</p>
</div>
<script type="module">
import { EvenBetterSdk } from '@jappyjan/even-better-sdk'

const statusEl = document.getElementById('status')
const connectBtn = document.getElementById('connect-btn')

connectBtn.addEventListener('click', async () => {
  statusEl.textContent = 'Connecting...'
  try {
    const rawBridge = await EvenBetterSdk.getRawBridge()
    console.log('[TEST] Raw bridge:', rawBridge)

    const sdk = new EvenBetterSdk()
    const page = sdk.createPage('test-page')

    const text = page.addTextElement('Hello from G2!\nHome Assistant Glasses')
    text.setPosition(p => p.setX(0).setY(0))
    text.setSize(s => s.setWidth(576).setHeight(288))
    text.markAsEventCaptureElement()

    await page.render()
    console.log('[TEST] Page rendered!')
    statusEl.textContent = 'Connected - check glasses display!'
  } catch (err) {
    console.error('[TEST] Error:', err)
    statusEl.textContent = 'Failed: ' + err.message
  }
})
</script>
</body>
</html>

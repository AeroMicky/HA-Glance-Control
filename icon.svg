<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glasses frame — G2 inspired -->
  <!-- Bridge -->
  <rect x="226" y="218" width="60" height="10" rx="5" fill="url(#accent)" opacity="0.9"/>
  <!-- Left lens ring -->
  <circle cx="170" cy="223" r="62" fill="none" stroke="url(#accent)" stroke-width="14" filter="url(#glow)"/>
  <!-- Right lens ring -->
  <circle cx="342" cy="223" r="62" fill="none" stroke="url(#accent)" stroke-width="14" filter="url(#glow)"/>
  <!-- Left temple -->
  <line x1="108" y1="223" x2="64" y2="223" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right temple -->
  <line x1="404" y1="223" x2="448" y2="223" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>

  <!-- Left lens dot — glance -->
  <circle cx="170" cy="223" r="14" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <!-- Right lens dot — control ring -->
  <circle cx="342" cy="223" r="20" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.7"/>
  <circle cx="342" cy="223" r="6" fill="url(#accent)" opacity="0.9"/>

  <!-- HA label -->
  <text x="256" y="370" text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-weight="700" font-size="72" letter-spacing="8"
    fill="url(#accent)" opacity="0.95">HA</text>
</svg>